<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tobebe · Приглашение</title>
    <meta name="theme-color" content="#0f0f12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tobebe">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://tobebe.online/icon-192.png">
    <link rel="manifest" href="https://tobebe.online/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
            background: #0f0f12;
            color: #ffffff;
            min-height: 100dvh;
        }

        .screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        
        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: max(20px, env(safe-area-inset-top)) 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 15, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        
        .logo-square {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: transparent;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffffff;
            transition: all 0.2s ease;
        }

        .dot:nth-child(1) {
            animation: pulseDot 1.2s infinite ease;
        }
        .dot:nth-child(2) {
            animation: pulseDot 1.2s infinite ease 0.2s;
        }
        .dot:nth-child(3) {
            animation: pulseDot 1.2s infinite ease 0.4s;
        }

        @keyframes pulseDot {
            0%, 100% {
                opacity: 0.35;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        .brand {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #ffffff;
            opacity: 0.92;
        }

        
        .body {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 20px 40px;
        }

        
        .invite-card {
            width: min(400px, 100%);
            background: transparent;
            text-align: center;
        }

        
        .group-avatar {
            width: 112px;
            height: 112px;
            border-radius: 32px;
            margin: 0 auto 24px;
            background: #1c1c20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 500;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
        }

        .group-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        
        .group-name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        
        .group-meta {
            color: #8e8e93;
            font-size: 15px;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
        }

        .member-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238e8e93"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>') no-repeat center;
            background-size: contain;
        }

        
        .go-btn {
            margin-top: 32px;
            width: 100%;
            border: none;
            background: #007aff;
            color: #ffffff;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: -0.2px;
        }

        .go-btn:hover {
            background: #005fcb;
            transform: scale(0.98);
        }

        .go-btn:active {
            transform: scale(0.97);
        }

        
        .status-card {
            text-align: center;
            padding: 32px 24px;
        }

        .status {
            color: #8e8e93;
            font-size: 15px;
            font-weight: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-top: 2px solid #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-icon {
            font-size: 42px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .invite-card {
            animation: fadeUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        
        @media (max-width: 480px) {
            .header {
                padding: max(16px, env(safe-area-inset-top)) 20px 12px;
            }
            
            .group-name {
                font-size: 28px;
            }
            
            .group-avatar {
                width: 96px;
                height: 96px;
                border-radius: 28px;
                margin-bottom: 20px;
            }
            
            .go-btn {
                padding: 13px 20px;
                font-size: 16px;
            }
            
            .brand {
                font-size: 20px;
            }
        }

        
        @media (prefers-color-scheme: dark) {
            body {
                background: #0f0f12;
            }
        }
    </style>
</head>
<body>
<div class="screen">
    <div class="header">
        <div class="logo-square">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="brand">Tobebe</div>
    </div>
    <div class="body" id="body"></div>
</div>

<script>
    const apiUrl = 'https://tobebe.online/api.php';
    const escapeHtml = (value) => String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const getWord = (n, titles) => {
        const cases = [2, 0, 1, 1, 1, 2];
        return titles[(n % 100 > 4 && n % 100 < 20) ? 2 : cases[Math.min(n % 10, 5)]];
    };
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const groupId = params.get('group_id') || '';
    const channelId = params.get('channel_id') || '';
    const channelPublicId = params.get('channel') || '';
    const channelToken = params.get('channel_token') || '';

    const renderLoading = () => {
        document.getElementById('body').innerHTML = `
            <div class="status-card">
                <div class="status">
                    <div class="spinner"></div>
                    <span>Загрузка</span>
                </div>
            </div>
        `;
    };
    const renderError = (customMsg = null) => {
        document.getElementById('body').innerHTML = `
            <div class="status-card">
                <div class="status">
                    <div class="error-icon">○</div>
                    <span>${customMsg || 'Приглашение недействительно'}</span>
                </div>
            </div>
        `;
    };
    const formatNumber = (num) => {
        if (num >= 1000) {
            return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        }
        return num.toString();
    };

    const renderGroup = (group) => {
        const membersCount = Number(group.members_count || 0);
        const displayMembers = formatNumber(membersCount);
        const memberWord = getWord(membersCount, ['участник', 'участника', 'участников']);
        
        let avatarContent = '';
        if (group.avatar && group.avatar.trim() !== '') {
            avatarContent = `<img src="${escapeHtml(group.avatar)}" alt="">`;
        } else {
            const initial = String(group.name || 'Г').charAt(0).toUpperCase();
            avatarContent = `<span style="font-size: 44px; font-weight: 500; color: #ffffff;">${escapeHtml(initial)}</span>`;
        }

        document.getElementById('body').innerHTML = `
            <div class="invite-card">
                <div class="group-avatar">${avatarContent}</div>
                <div class="group-name">${escapeHtml(group.name || 'Группа')}</div>
                <div class="group-meta">
                    <span class="member-icon"></span>
                    <span>${displayMembers} ${memberWord}</span>
                </div>
                <button class="go-btn" id="goBtn">Присоединиться →</button>
            </div>
        `;

        const btn = document.getElementById('goBtn');
        if (btn) {
            btn.addEventListener('click', () => {
                window.location.href = `https://tobebe.online/index_group.html?group_id=${encodeURIComponent(group.id)}`;
            });
        }
    };

    const getCurrentUserId = () => {
        try {
            return JSON.parse(localStorage.getItem('tobebe_user') || 'null')?.id || 0;
        } catch {
            return 0;
        }
    };

    const renderChannel = (channel) => {
        const subscribersCount = Number(channel.members_count || (channel.member_ids || []).length || 0);
        const displaySubscribers = formatNumber(subscribersCount);
        const subscribersWord = getWord(subscribersCount, ['подписчик', 'подписчика', 'подписчиков']);
        let avatarContent = '';
        if (channel.avatar && String(channel.avatar).trim() !== '') {
            avatarContent = `<img src="${escapeHtml(channel.avatar)}" alt="">`;
        } else {
            const initial = String(channel.name || 'К').charAt(0).toUpperCase();
            avatarContent = `<span style="font-size: 44px; font-weight: 500; color: #ffffff;">${escapeHtml(initial)}</span>`;
        }
        document.getElementById('body').innerHTML = `
            <div class="invite-card">
                <div class="group-avatar">${avatarContent}</div>
                <div class="group-name">${escapeHtml(channel.name || 'Канал')}</div>
                <div class="group-meta">
                    <span class="member-icon"></span>
                    <span>${displaySubscribers} ${subscribersWord}</span>
                </div>
                <button class="go-btn" id="goBtn">Открыть канал →</button>
            </div>
        `;
        document.getElementById('goBtn')?.addEventListener('click', () => {
            window.location.href = `https://tobebe.online/index.html?chat_mode=channel&channel_id=${encodeURIComponent(channel.id)}`;
        });
    };

    const init = async () => {
        if (!token && !groupId && !channelId && !channelPublicId && !channelToken) {
            renderError();
            return;
        }
        renderLoading();
        const isChannelRequest = !!(channelId || channelPublicId || channelToken);
        if (isChannelRequest) {
            try {
                const q = new URLSearchParams();
                q.set('action', 'get_channel_invite_info');
                if (channelId) q.set('channel_id', channelId);
                if (channelPublicId) q.set('public_id', channelPublicId);
                if (channelToken) q.set('token', channelToken);
                const uid = Number(getCurrentUserId() || 0);
                if (uid > 0) q.set('user_id', String(uid));
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(`${apiUrl}?${q.toString()}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await res.json();
                if (!data.success || !data.channel) {
                    renderError();
                    return;
                }
                renderChannel(data.channel);
                return;
            } catch (err) {
                console.warn('API error:', err);
                renderError();
                return;
            }
        }
        try {
            const url = token
                ? `${apiUrl}?action=get_group_invite_info&token=${encodeURIComponent(token)}`
                : `${apiUrl}?action=get_group_invite_info&group_id=${encodeURIComponent(groupId)}`;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await res.json();
            if (!data.success || !data.group) {
                renderError();
                return;
            }
            renderGroup(data.group);
        } catch (err) {
            console.warn('API error:', err);
            renderError();
        }
    };
    init();
</script>
</body>
</html>
