<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; connect-src 'self' https://tobebe.online wss://tobebe.online; img-src 'self' data: blob: https://tobebe.online; media-src 'self' data: blob: https://tobebe.online; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.cdnfonts.com; font-src 'self' data: https://fonts.cdnfonts.com; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests; block-all-mixed-content">
    <title>Tobebe · группа</title>
    <meta name="description" content="Tobebe - профиль группы">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tobebe">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            min-height: 100dvh;
        }

        .screen {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            padding: max(16px, env(safe-area-inset-top)) 20px 12px;
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: none;
        }

        .back-btn, .edit-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-btn:active, .edit-btn:active {
            transform: scale(0.92);
            background: #580005;
        }

        .title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 32px;
        }

        .avatar-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center top;
            will-change: transform, padding;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            overflow: hidden;
            border: none;
            background: #1c1c20;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 500;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.5);
            transform-origin: center;
            margin-bottom: 12px;
            will-change: transform, border-radius, width, height, border-color;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-section.expanded .avatar-box {
            width: min(280px, 70vw);
            height: min(280px, 70vw);
            border-radius: 32px;
            margin-bottom: 16px;
            border-width: 3px;
        }

        .avatar-section.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            background: #0A0A0C;
            margin: 0;
            padding: 0;
            animation: fadeIn 0.3s ease;
        }

        .avatar-section.fullscreen .avatar-box {
            width: min(82vw, 540px);
            height: min(82vw, 540px);
            border-radius: 28px;
            border: none;
            margin: 0;
            box-shadow: none;
            background: transparent;
        }

        .avatar-section.fullscreen ~ .group-name,
        .avatar-section.fullscreen ~ .group-meta,
        .avatar-section.fullscreen ~ .group-description,
        .avatar-section.fullscreen ~ .actions-row,
        .avatar-section.fullscreen ~ .editor-panel,
        .avatar-section.fullscreen ~ .tabs,
        .avatar-section.fullscreen ~ .tab-pane {
            opacity: 0;
            pointer-events: none;
        }

        .group-name {
            margin-top: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
        }

        .group-meta {
            text-align: center;
            color: #8e8e93;
            margin-top: 6px;
            font-size: 14px;
        }

        .group-description {
            text-align: center;
            color: #aeaeb2;
            margin-top: 12px;
            font-size: 15px;
            line-height: 1.45;
        }

        .actions-row {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn.danger {
            background: rgba(88, 0, 5, 0.25);
            color: #ff6b6b;
        }

        
        .editor-panel {
            margin-top: 32px;
            display: none;
        }

        .can-edit .editor-panel {
            display: block;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-card {
            background: #121216;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(88, 0, 5, 0.2);
        }

        .setting-section {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-section:last-child {
            border-bottom: none;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-icon {
            width: 36px;
            height: 36px;
            background: rgba(88, 0, 5, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            font-size: 17px;
            font-weight: 600;
        }

        .section-desc {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 2px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #580005;
            background: #1f1f24;
        }

        .textarea-field {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            min-height: 90px;
            resize: vertical;
            margin-top: 12px;
        }

        .textarea-field:focus {
            outline: none;
            border-color: #580005;
        }

        
        .group-type-selector {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .type-card {
            flex: 1;
            background: #1a1a1f;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .type-card.selected {
            border-color: #580005;
            background: linear-gradient(135deg, rgba(88, 0, 5, 0.15), rgba(88, 0, 5, 0.05));
        }

        .type-card.selected::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 30px 30px 0;
            border-color: transparent #580005 transparent transparent;
        }

        .type-card.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 1;
        }

        .type-icon-svg {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            display: block;
        }

        .type-icon-svg svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .type-card.selected .type-icon-svg svg {
            stroke: #580005;
        }

        .type-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .type-description {
            font-size: 12px;
            color: #8e8e93;
            line-height: 1.4;
        }

        .type-card:active {
            transform: scale(0.98);
        }

        
        .avatar-setting {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .avatar-preview-box {
            width: 72px;
            height: 72px;
            border-radius: 36px;
            background: #1a1a1f;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            border: 2px solid #580005;
            flex-shrink: 0;
        }

        .avatar-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-change-btn {
            background: rgba(88, 0, 5, 0.2);
            border: 1px solid rgba(88, 0, 5, 0.3);
            padding: 10px 20px;
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-change-btn:active {
            transform: scale(0.96);
            background: #580005;
        }

        .admin-link {
            padding: 16px 20px;
            background: rgba(88, 0, 5, 0.1);
            border: 1px solid rgba(88, 0, 5, 0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-link:active {
            transform: scale(0.98);
            background: rgba(88, 0, 5, 0.15);
        }

        .admin-link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-link-text {
            font-weight: 500;
        }

        .admin-link-sub {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 2px;
        }

        .action-buttons-group {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .primary-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #580005, #3a0003);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .primary-btn:active {
            transform: scale(0.97);
        }

        .danger-btn-red {
            width: 100%;
            padding: 16px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 18px;
            color: #ff3b30;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .danger-btn-red:active {
            transform: scale(0.97);
            background: rgba(255, 59, 48, 0.2);
        }

       
        .tabs {
            margin-top: 28px;
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(22, 24, 29, 0.6);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            border: none;
            border-radius: 32px;
            padding: 12px 8px;
            color: #8e8e93;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #ffffff;
            background: rgba(88, 0, 5, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tab-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-pane {
            margin-top: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty {
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            padding: 32px 20px;
            color: #8e8e93;
            text-align: center;
            border: 0.5px solid rgba(88, 0, 5, 0.2);
        }

        .media-content {
            min-height: 150px;
            max-height: 420px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .media-grid-item {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }

        .media-grid-item img,
        .media-grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-grid-item.video::after {
            content: '';
            position: absolute;
            inset: auto 10px 10px auto;
            width: 24px;
            height: 24px;
            border-radius: 999px;
            background: rgba(0,0,0,0.58);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 6px 16px rgba(0,0,0,0.35);
        }

        .voice-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .voice-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1E2128;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #252831;
        }

        .voice-item:active {
            background: #252831;
            transform: scale(0.98);
            border-color: #580005;
        }

        .voice-play {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #580005;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            flex-shrink: 0;
        }

        .voice-play svg {
            width: 20px;
            height: 20px;
        }

        .voice-info {
            flex: 1;
            min-width: 0;
        }

        .voice-name {
            font-size: 14px;
            color: #FFFFFF;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .voice-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: #8A8F99;
            flex-wrap: wrap;
            align-items: center;
        }

        .voice-sender {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
            color: #C7CCD6;
            font-weight: 500;
        }

        .voice-sender-avatar {
            width: 18px;
            height: 18px;
            border-radius: 9px;
            overflow: hidden;
            background: #2C2F38;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .voice-sender-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .voice-sender-avatar span {
            font-size: 10px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: #1E2128;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #252831;
        }

        .link-item:active {
            background: #252831;
            transform: scale(0.98);
            border-color: #580005;
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(88,0,5,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #580005;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 20px;
            height: 20px;
        }

        .link-content {
            flex: 1;
            min-width: 0;
        }

        .link-url {
            font-size: 13px;
            color: #580005;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .link-meta {
            font-size: 11px;
            color: #8A8F99;
        }

        .media-empty {
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #A8AFBD;
            gap: 8px;
        }

        .media-empty svg {
            width: 48px;
            height: 48px;
            stroke: #2C2F38;
            margin-bottom: 16px;
        }

        .image-viewer-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            touch-action: none;
        }

        .image-viewer-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .image-viewer-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transform: translateY(0) scale(1);
            transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .image-viewer-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transform-origin: center;
            will-change: transform;
            touch-action: none;
            user-select: none;
            -webkit-user-drag: none;
            cursor: grab;
        }

        .image-viewer-image:active {
            cursor: grabbing;
        }

        .image-viewer-image.zoomed {
            cursor: zoom-out;
        }

        .iv-back,
        .iv-menu,
        .iv-top-info,
        .iv-popup {
            position: absolute;
            z-index: 12;
        }

        .iv-glass {
            background: linear-gradient(145deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08) 55%, rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 22px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(18px) saturate(170%);
            -webkit-backdrop-filter: blur(18px) saturate(170%);
            color: #fff;
        }

        .iv-back,
        .iv-menu {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            top: max(16px, env(safe-area-inset-top));
            border: none;
            cursor: pointer;
        }

        .iv-back {
            left: 14px;
        }

        .iv-menu {
            right: 14px;
        }

        .iv-top-info {
            left: 50%;
            transform: translateX(-50%);
            top: max(16px, env(safe-area-inset-top));
            padding: 8px 14px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: min(80%, 560px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .iv-top-info .iv-sender {
            font-size: 13px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .iv-top-info .iv-dot {
            margin: 0 6px;
            opacity: 0.8;
        }

                        created_at: msg?.created_at || '',

    const animateMediaViewerEntry = (sourceEl, targetEl) => {
        if (!sourceEl || !targetEl) return;
        const sourceVisual = sourceEl.matches('img,video') ? sourceEl : sourceEl.querySelector('img,video');
        if (!sourceVisual) return;
        const sourceRect = sourceVisual.getBoundingClientRect();
        const targetRect = targetEl.getBoundingClientRect();
        if (sourceRect.width < 8 || sourceRect.height < 8 || targetRect.width < 8 || targetRect.height < 8) return;
        const previewSrc = sourceVisual.currentSrc || sourceVisual.src;
        if (!previewSrc) return;
        const clone = document.createElement('img');
        clone.src = previewSrc;
        clone.className = 'media-viewer-entry-clone';
        clone.style.left = `${sourceRect.left}px`;
        clone.style.top = `${sourceRect.top}px`;
        clone.style.width = `${sourceRect.width}px`;
        clone.style.height = `${sourceRect.height}px`;
        clone.style.opacity = '1';
        document.body.appendChild(clone);
        targetEl.style.opacity = '0';
        requestAnimationFrame(() => {
            clone.style.transition = 'left 0.34s cubic-bezier(0.22,1,0.36,1), top 0.34s cubic-bezier(0.22,1,0.36,1), width 0.34s cubic-bezier(0.22,1,0.36,1), height 0.34s cubic-bezier(0.22,1,0.36,1), border-radius 0.34s ease, opacity 0.2s ease';
            clone.style.left = `${targetRect.left}px`;
            clone.style.top = `${targetRect.top}px`;
            clone.style.width = `${targetRect.width}px`;
            clone.style.height = `${targetRect.height}px`;
            clone.style.borderRadius = '8px';
        });
        const finalize = () => {
            targetEl.style.opacity = '1';
            clone.remove();
        };
        clone.addEventListener('transitionend', finalize, { once: true });
        setTimeout(finalize, 420);
    };

    const animateMediaViewerReturnToGrid = (targetEl, mediaIndex, done) => {
        const finish = typeof done === 'function' ? done : () => {};
        const source = getGroupMediaElement(mediaIndex);
        const sourceVisual = source?.matches('img,video') ? source : source?.querySelector?.('img,video');
        if (!targetEl || !sourceVisual) return finish();
        const fromRect = targetEl.getBoundingClientRect();
        const toRect = sourceVisual.getBoundingClientRect();
        if (fromRect.width < 8 || fromRect.height < 8 || toRect.width < 8 || toRect.height < 8) return finish();
        const previewSrc = sourceVisual.currentSrc || sourceVisual.src || targetEl.currentSrc || targetEl.src;
        if (!previewSrc) return finish();
        const clone = document.createElement('img');
        clone.src = previewSrc;
        clone.className = 'media-viewer-entry-clone';
        clone.style.left = `${fromRect.left}px`;
        clone.style.top = `${fromRect.top}px`;
        clone.style.width = `${fromRect.width}px`;
        clone.style.height = `${fromRect.height}px`;
        clone.style.opacity = '1';
        document.body.appendChild(clone);
        targetEl.style.opacity = '0';
        requestAnimationFrame(() => {
            clone.style.transition = 'left 0.3s cubic-bezier(0.22,1,0.36,1), top 0.3s cubic-bezier(0.22,1,0.36,1), width 0.3s cubic-bezier(0.22,1,0.36,1), height 0.3s cubic-bezier(0.22,1,0.36,1), border-radius 0.3s ease, opacity 0.2s ease';
            clone.style.left = `${toRect.left}px`;
            clone.style.top = `${toRect.top}px`;
            clone.style.width = `${toRect.width}px`;
            clone.style.height = `${toRect.height}px`;
            clone.style.borderRadius = '14px';
            clone.style.opacity = '0.98';
        });
        const cleanup = () => { clone.remove(); finish(); };

    const navigateMediaViewer = (direction = 1, options = {}) => {
        const { gesture = false } = options;
        if (mediaViewerTransitionLock || !mediaViewerItems.length) return false;
        const index = Number(mediaViewerActiveIndex);
        if (!Number.isFinite(index) || index < 0) return false;
        const nextIndex = (index + direction + mediaViewerItems.length) % mediaViewerItems.length;
        if (nextIndex === index) return false;
        const nextItem = mediaViewerItems[nextIndex];
        if (!nextItem) return false;
        mediaViewerTransitionLock = true;
        setTimeout(() => { mediaViewerTransitionLock = false; }, 220);
        mediaViewerActiveIndex = nextIndex;
        if (gesture) {
            const activeEl = mediaViewerActiveType === 'video' ? document.getElementById('videoPlayer') : document.getElementById('imageViewerImage');
            if (activeEl) {
                activeEl.style.transition = 'transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.18s ease';
                activeEl.style.transform = `translate3d(${-direction * 68}px, 0, 0) scale(1)`;
                activeEl.style.opacity = '0.74';
            }
        }
        const openNext = () => {
            if (nextItem.type === 'image') {
                if (document.getElementById('videoPlayerModal')?.classList.contains('show')) closeVideoPlayer();
                openImageViewer(nextItem.src, nextItem.item, { mediaIndex: nextItem.mediaIndex, skipQueueRefresh: true, skipEntryAnimation: true, swipeDirection: gesture ? direction : 0 });
            } else {
                const imageModal = document.getElementById('imageViewerModal');
                if (imageModal?.classList.contains('show')) imageModal.classList.remove('show', 'closing', 'chrome-hidden');
                openVideoPlayer(nextItem.src, nextItem.item, { mediaIndex: nextItem.mediaIndex, skipQueueRefresh: true, skipEntryAnimation: true, swipeDirection: gesture ? direction : 0 });
            }
        };
        if (gesture) setTimeout(openNext, 74); else openNext();
        return true;
    };

    const openMediaItem = (index, triggerEvent = null) => {
        const mediaIndex = Number(index);
        const item = mediaItems[mediaIndex];
        if (!item?.src) return;
        const sourceEl = triggerEvent?.currentTarget || getGroupMediaElement(mediaIndex);
        if (item.isVideo) openVideoPlayer(item.src, item, { mediaIndex, sourceEl });
        else openImageViewer(item.src, item, { mediaIndex, sourceEl });
    };

    const openImageViewer = (src, item = null, options = {}) => {
        const modal = document.getElementById('imageViewerModal');
        const image = document.getElementById('imageViewerImage');
        const infoBar = document.getElementById('imageViewerTopInfo');

        viewerOffsetX = 0;
        viewerOffsetY = 0;
        currentViewerSrc = src;
        if (mediaViewerSpringFrame) cancelAnimationFrame(mediaViewerSpringFrame);

        modal.style.opacity = '';
        if (content) content.style.transform = '';
        mediaViewerUiVisible = true;
        if (!skipEntryAnimation) requestAnimationFrame(() => animateMediaViewerEntry(sourceEl || getGroupMediaElement(mediaIndex), image));
        else if (swipeDirection) {

    const closeImageViewer = (options = {}) => {

        if (imageViewerMomentumFrame) cancelAnimationFrame(imageViewerMomentumFrame);
        if (mediaViewerSpringFrame) cancelAnimationFrame(mediaViewerSpringFrame);

        if (animateReturn && image) {

    const applyVideoViewerTransform = (options = {}) => {
        if (!videoPlayerEl) return;
        const softBounds = Boolean(options?.softBounds);
        const container = document.querySelector('.video-player-container');
        if (container && videoViewerScale > 1.01) {
            const bounds = container.getBoundingClientRect();
            const naturalW = videoPlayerEl.videoWidth || bounds.width || 1;
            const naturalH = videoPlayerEl.videoHeight || bounds.height || 1;
            const fitScale = Math.min(bounds.width / naturalW, bounds.height / naturalH);
            const baseW = naturalW * fitScale;
            const baseH = naturalH * fitScale;
            const scaledW = baseW * videoViewerScale;
            const scaledH = baseH * videoViewerScale;
            const maxX = Math.max(0, (scaledW - bounds.width) / 2);
            const maxY = Math.max(0, (scaledH - bounds.height) / 2);
            if (softBounds) {
                const overX = Math.abs(videoViewerOffsetX) - maxX;
                const overY = Math.abs(videoViewerOffsetY) - maxY;
                if (overX > 0) videoViewerOffsetX = Math.sign(videoViewerOffsetX) * (maxX + overX * 0.28);
                if (overY > 0) videoViewerOffsetY = Math.sign(videoViewerOffsetY) * (maxY + overY * 0.28);
            } else {
                videoViewerOffsetX = Math.max(-maxX, Math.min(maxX, videoViewerOffsetX));
                videoViewerOffsetY = Math.max(-maxY, Math.min(maxY, videoViewerOffsetY));
            }
        } else if (videoViewerScale <= 1.01) {
            videoViewerOffsetX = 0;
            videoViewerOffsetY = 0;
        }
        videoPlayerEl.style.transform = `translate3d(${videoViewerOffsetX}px, ${videoViewerOffsetY}px, 0) scale(${videoViewerScale})`;
    };

    const showVideoUi = (autoHide = true) => {
        const container = document.querySelector('.video-player-container');
        if (!container) return;
        mediaViewerUiVisible = true;
        container.classList.add('show-ui');
        if (videoUiTimer) clearTimeout(videoUiTimer);
        if (!autoHide) return;
        videoUiTimer = setTimeout(() => {
            if (videoPlayerEl && !videoPlayerEl.paused) {
                mediaViewerUiVisible = false;
                container.classList.remove('show-ui');
            }
        }, 1800);
    };

    const toggleVideoPlay = () => {
        const playBtn = document.getElementById('videoPlayerPlay');
        const centerBtn = document.getElementById('videoCenterPlay');
        if (!videoPlayerEl) return;
        if (videoPlayerEl.paused) videoPlayerEl.play().catch(() => {});
        else videoPlayerEl.pause();
        const iconHtml = videoPlayerEl.paused
            ? '<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><polygon points="8,5 19,12 8,19"></polygon></svg>'
            : '<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><rect x="7" y="5" width="4" height="14"></rect><rect x="13" y="5" width="4" height="14"></rect></svg>';
        if (playBtn) playBtn.innerHTML = iconHtml;
        if (centerBtn) centerBtn.innerHTML = videoPlayerEl.paused
            ? '<svg viewBox="0 0 24 24" fill="currentColor" width="34" height="34"><polygon points="8,5 19,12 8,19"></polygon></svg>'
            : '<svg viewBox="0 0 24 24" fill="currentColor" width="34" height="34"><rect x="7" y="5" width="4" height="14"></rect><rect x="13" y="5" width="4" height="14"></rect></svg>';
    };

    const updateVideoProgress = () => {
        const progressFill = document.getElementById('videoProgressFill');
        const timeEl = document.getElementById('videoTime');
        if (!videoPlayerEl || !progressFill || !timeEl) return;
        const percent = (videoPlayerEl.currentTime / videoPlayerEl.duration) * 100 || 0;
        progressFill.style.width = percent + '%';
        const formatTime = (seconds) => {
            if (Number.isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };
        timeEl.textContent = `${formatTime(videoPlayerEl.currentTime)} / ${formatTime(videoPlayerEl.duration)}`;
    };

    const openVideoPlayer = (videoUrl, item = null, options = {}) => {
        const { mediaIndex = -1, sourceEl = null, skipQueueRefresh = false, skipEntryAnimation = false, swipeDirection = 0 } = options;
        currentVideoUrl = String(videoUrl || '');
        const modal = document.getElementById('videoPlayerModal');
        const video = document.getElementById('videoPlayer');
        const container = document.querySelector('.video-player-container');
        const infoBar = document.getElementById('videoViewerTopInfo');
        if (!modal || !video) return;
        if (videoProgressInterval) clearInterval(videoProgressInterval);
        if (!skipQueueRefresh) syncMediaViewerQueue(mediaIndex);
        mediaViewerActiveType = 'video';
        mediaViewerActiveIndex = mediaViewerItems.findIndex((entry) => entry.mediaIndex === Number(mediaIndex));
        videoViewerScale = 1;
        videoViewerOffsetX = 0;
        videoViewerOffsetY = 0;
        applyVideoViewerTransform();
        if (infoBar) infoBar.innerHTML = getMediaViewerTopInfoHtml(item);
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.src = currentVideoUrl;
        video.load();
        modal.classList.add('show');
        mediaViewerUiVisible = true;
        if (container) container.classList.add('show-ui');
        showVideoUi();
        if (!skipEntryAnimation) requestAnimationFrame(() => animateMediaViewerEntry(sourceEl || getGroupMediaElement(mediaIndex), video));
        else if (swipeDirection) {
            video.style.opacity = '1';
            video.style.transition = 'none';
            video.style.transform = `translate3d(${swipeDirection * 82}px, 0, 0) scale(1)`;
            requestAnimationFrame(() => {
                video.style.transition = 'transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.24s ease';
                video.style.transform = 'translate3d(0px, 0px, 0) scale(1)';
            });
        } else video.style.opacity = '1';
        videoProgressInterval = setInterval(() => updateVideoProgress(), 100);
        video.onloadedmetadata = () => updateVideoProgress();
        video.ontimeupdate = () => updateVideoProgress();
        video.onended = () => showVideoUi();
        video.play().catch(() => {
            updateVideoProgress();
            if (container) container.classList.add('show-ui');
        });

    const closeVideoPlayer = (options = {}) => {
        const { animateReturn = false } = options;
        const modal = document.getElementById('videoPlayerModal');
        const video = document.getElementById('videoPlayer');
        const container = document.querySelector('.video-player-container');
        const menuPopup = document.getElementById('videoViewerMenuPopup');
        if (!modal || !video) return;
        if (videoViewerPointerId !== null && video.hasPointerCapture?.(videoViewerPointerId)) video.releasePointerCapture(videoViewerPointerId);
        videoViewerPointerId = null;
        const finalizeClose = () => {
            video.pause();
            video.removeAttribute('src');
            video.load();
            modal.classList.remove('show');
            modal.style.opacity = '';
            modal.style.visibility = '';
            modal.style.pointerEvents = '';
            if (container) container.classList.remove('show-ui');
            if (container) {
                container.style.transition = '';
                container.style.transform = '';
            }
            if (menuPopup) menuPopup.style.display = 'none';
            videoViewerScale = 1;
            videoViewerOffsetX = 0;
            videoViewerOffsetY = 0;
            applyVideoViewerTransform();
            if (videoProgressInterval) clearInterval(videoProgressInterval);
            if (videoUiTimer) clearTimeout(videoUiTimer);
        };
        if (animateReturn) {
            const current = mediaViewerItems[mediaViewerActiveIndex];
            animateMediaViewerReturnToGrid(video, current?.mediaIndex, finalizeClose);
            return;
        }
        finalizeClose();
    };

    const setupImageViewerGestures = () => {
        const modal = document.getElementById('imageViewerModal');
        const image = document.getElementById('imageViewerImage');
        const content = document.getElementById('imageViewerContent');
        const backBtn = document.getElementById('imageViewerBack');
        const menuBtn = document.getElementById('imageViewerMenu');
        const menuPopup = document.getElementById('imageViewerMenuPopup');
        const downloadBtn = document.getElementById('imageViewerDownloadBtn');
        if (!modal || !image) return;
        let swipeStartY = 0, swipeStartX = 0, swipeDx = 0;
        let swipeActive = false, swipeAxis = '', swipeSwitched = false;
        image.addEventListener('click', () => {
            mediaViewerUiVisible = !mediaViewerUiVisible;
            modal.classList.toggle('chrome-hidden', !mediaViewerUiVisible);
        });
        backBtn?.addEventListener('click', () => closeImageViewer({ animateReturn: true }));
        menuBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            menuPopup?.classList.toggle('open');
        });
        downloadBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!currentViewerSrc) return;
            const a = document.createElement('a');
            a.href = currentViewerSrc;
            a.download = '';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            a.remove();
            menuPopup?.classList.remove('open');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#imageViewerMenu') && !e.target.closest('#imageViewerMenuPopup')) menuPopup?.classList.remove('open');
        });
        if (!content) return;
        content.addEventListener('touchstart', (e) => {
            if (e.touches.length !== 1) { swipeActive = false; return; }
            swipeStartY = e.touches[0].clientY;
            swipeStartX = e.touches[0].clientX;
            swipeDx = 0;
            swipeAxis = '';
            swipeSwitched = false;
            swipeActive = true;
        }, { passive: true });
        content.addEventListener('touchmove', (e) => {
            if (!swipeActive || e.touches.length !== 1) return;
            const dy = e.touches[0].clientY - swipeStartY;
            swipeDx = e.touches[0].clientX - swipeStartX;
            const absDy = Math.abs(dy);
            const absDx = Math.abs(swipeDx);
            if (!swipeAxis && (absDx > 7 || absDy > 7)) swipeAxis = absDx > absDy ? 'x' : 'y';
            if (swipeAxis === 'y' && dy > 0) {
                e.preventDefault();
                const t = Math.min(1, dy / 300);
                modal.style.opacity = String(1 - t * 0.78);
                content.style.transform = `translateY(${dy}px) scale(${1 - t * 0.04})`;
            } else if (swipeAxis === 'x') {
                e.preventDefault();
                content.style.transition = 'none';
                content.style.transform = `translateX(${swipeDx * 0.62}px)`;
                if (!swipeSwitched && Math.abs(swipeDx) > 52) {
                    const changed = navigateMediaViewer(swipeDx < 0 ? 1 : -1, { gesture: true });
                    if (changed) {
                        swipeSwitched = true;
                        swipeActive = false;
                        content.style.transition = '';
                        content.style.transform = '';
                    }
                }
            }
        }, { passive: false });
        content.addEventListener('touchend', (e) => {
            if (!swipeActive) return;
            const endY = (e.changedTouches && e.changedTouches[0]?.clientY) || 0;
            const dy = endY - swipeStartY;
            const shouldClose = swipeAxis === 'y' && dy > 120;
            const shouldNavigate = swipeAxis === 'x' && Math.abs(swipeDx) > 50;
            if (shouldClose) {
                modal.style.opacity = '';
                closeImageViewer({ animateReturn: true });
            } else if (shouldNavigate && !swipeSwitched) {
                modal.style.opacity = '';
                content.style.transform = '';
                navigateMediaViewer(swipeDx < 0 ? 1 : -1, { gesture: true });
            } else {
                modal.style.opacity = '1';
                content.style.transition = '';
                content.style.transform = '';
            }
            swipeActive = false;
            swipeAxis = '';
        });
    };

    const setupVideoPlayer = () => {
        videoPlayerEl = document.getElementById('videoPlayer');
        const videoModal = document.getElementById('videoPlayerModal');
        const videoProgress = document.getElementById('videoProgress');
        const videoPlayBtn = document.getElementById('videoPlayerPlay');
        const videoHit = document.getElementById('videoPlayerHit');
        const centerPlay = document.getElementById('videoCenterPlay');
        const container = document.querySelector('.video-player-container');
        const topBack = document.getElementById('videoViewerBack');
        const topMenu = document.getElementById('videoViewerMenu');

        videoPlayerEl.controls = false;
        videoPlayerEl.playsInline = true;
        videoPlayerEl.setAttribute('playsinline', '');
        videoPlayerEl.preload = 'metadata';
        const showSkipFeedback = (seconds) => {
            if (!skipFeedback) return;
            const isBackward = seconds < 0;
            skipFeedback.textContent = `${isBackward ? '−' : '+'}${Math.abs(Math.round(seconds))} сек`;
            skipFeedback.classList.add('show');
            setTimeout(() => skipFeedback.classList.remove('show'), 340);
        };
        videoPlayBtn?.addEventListener('click', () => toggleVideoPlay());
        centerPlay?.addEventListener('click', () => toggleVideoPlay());
        topBack?.addEventListener('click', () => closeVideoPlayer({ animateReturn: true }));
        topMenu?.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (topMenuPopup) topMenuPopup.style.display = topMenuPopup.style.display === 'block' ? 'none' : 'block';
        });
        topDownload?.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const src = currentVideoUrl || videoPlayerEl?.currentSrc || videoPlayerEl?.src || '';
            if (!src) return;
            const a = document.createElement('a');
            a.href = src;
            a.download = '';
            a.target = '_blank';
            a.rel = 'noopener';
            a.click();
            if (topMenuPopup) topMenuPopup.style.display = 'none';
        });
        if (videoProgress) {
            const seekToClientX = (clientX) => {
                const rect = videoProgress.getBoundingClientRect();
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / Math.max(1, rect.width)));
                if (videoPlayerEl.duration) {
                    videoPlayerEl.currentTime = pos * videoPlayerEl.duration;
                    updateVideoProgress();
                }
            };
            videoProgress.addEventListener('click', (e) => { e.stopPropagation(); seekToClientX(e.clientX); });
        }
        let lastTapAt = 0;
        videoHit?.addEventListener('click', (e) => {
            const now = Date.now();
            const rect = videoHit.getBoundingClientRect();
            if (now - lastTapAt < 290) {
                const onLeft = (e.clientX - rect.left) < (rect.width / 2);
                const shift = onLeft ? -5 : 5;
                if (Number.isFinite(videoPlayerEl.duration) && videoPlayerEl.duration > 0) {
                    videoPlayerEl.currentTime = Math.max(0, Math.min(videoPlayerEl.duration, videoPlayerEl.currentTime + shift));
                    updateVideoProgress();
                    showVideoUi(false);
                    showSkipFeedback(shift);
                }
                lastTapAt = 0;
                return;
            }
            lastTapAt = now;

        let swipeStartY = 0;

            swipeStartY = e.touches[0].clientY;
            swipeStartX = e.touches[0].clientX;

            swipeAxis = '';
            swipeDx = 0;
            swipeSwitched = false;
        }, { passive: true });
        container.addEventListener('touchmove', (e) => {
            if (!swipeActive || !e.touches || e.touches.length !== 1) return;
            const swipeDy = e.touches[0].clientY - swipeStartY;
            swipeDx = e.touches[0].clientX - swipeStartX;
            const absDy = Math.abs(swipeDy);
            const absDx = Math.abs(swipeDx);
            if (!swipeAxis && (absDx > 8 || absDy > 8)) swipeAxis = absDx > absDy ? 'x' : 'y';
            if (swipeAxis === 'y' && swipeDy > 0) {
                const shift = Math.min(220, swipeDy);
                const progress = Math.min(1, shift / 220);
                e.preventDefault();
                container.style.transition = 'none';
                container.style.transform = `translateY(${shift}px) scale(${1 - progress * 0.04})`;
                if (videoModal) videoModal.style.opacity = String(Math.max(0.35, 1 - progress * 0.7));
            } else if (swipeAxis === 'x') {
                e.preventDefault();
                container.style.transition = 'none';
                container.style.transform = `translateX(${swipeDx * 0.62}px)`;
                if (!swipeSwitched && Math.abs(swipeDx) > 52) {
                    const changed = navigateMediaViewer(swipeDx < 0 ? 1 : -1, { gesture: true });
                    if (changed) {
                        swipeSwitched = true;
                        swipeActive = false;
                        container.style.transition = '';
                        container.style.transform = '';
                        if (videoModal) videoModal.style.opacity = '';
                    }

        }, { passive: false });
        container.addEventListener('touchend', (e) => {
            if (!swipeActive) return;
            const endY = e.changedTouches?.[0]?.clientY ?? swipeStartY;

            const shouldClose = swipeAxis === 'y' && dy > 120;
            const shouldNavigate = swipeAxis === 'x' && Math.abs(swipeDx) > 50;
            if (!shouldClose) {
                container.style.transition = '';
                container.style.transform = '';
                if (videoModal) videoModal.style.opacity = '';

            swipeActive = false;
            swipeAxis = '';
            if (shouldClose) {

                closeVideoPlayer({ animateReturn: true });
            } else if (shouldNavigate && !swipeSwitched) {
                navigateMediaViewer(swipeDx < 0 ? 1 : -1, { gesture: true });
            }
        }, { passive: true });

            container.style.transition = '';
            container.style.transform = '';
            if (videoModal) videoModal.style.opacity = '';
            swipeActive = false;
            swipeAxis = '';
        }, { passive: true });
    };

    const renderMediaTab = (tabName = currentGroupTab) => {
        currentGroupTab = tabName;

        const pane = document.querySelector(`[data-pane="${tabName}"]`);

        let html = '';
        if (tabName === 'media') {
            if (!mediaItems.length) html = '<div class="media-empty"><p>Нет медиафайлов</p><small>Фото и видео из группы появятся здесь</small></div>';
            else {
                html = '<div class="media-grid">';
                mediaItems.forEach((item, index) => {
                    html += `<div class="media-grid-item ${item.isVideo ? 'video' : ''}" data-media-index="${index}">${item.isVideo ? `<video src="${escapeHtml(item.src)}" preload="metadata"></video>` : `<img src="${escapeHtml(item.src)}" loading="lazy" alt="">`}</div>`;
                });
                html += '</div>';
            }
        } else if (tabName === 'voice') {
            if (!voiceItems.length) {
                html = `
                    <div class="media-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="22"/>
                        </svg>
                        <p>Нет голосовых сообщений</p>
                    </div>
                `;
            }
            else {
                html = '<div class="voice-list">';
                voiceItems.forEach((item) => {
                    const date = formatItemDate(item.created_at);
                    const size = item.file_size ? `${(Number(item.file_size) / 1024).toFixed(0)} KB` : '';
                    const senderInitial = escapeHtml(String(item.sender_name || 'U').charAt(0).toUpperCase());
                    html += `
                        <div class="voice-item" data-voice-src="${escapeHtml(item.src)}" data-voice-id="${item.id}">
                            <div class="voice-play" id="voice-play-${item.id}">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="voice-info">
                                <div class="voice-name">Голосовое сообщение</div>
                                <div class="voice-meta">
                                    <span>${escapeHtml(date)}</span>
                                    <span>${escapeHtml(size)}</span>
                                    <span class="voice-sender">
                                        <span class="voice-sender-avatar">
                                            ${item.sender_avatar ? `<img src="${escapeHtml(item.sender_avatar)}">` : `<span>${senderInitial}</span>`}
                                        </span>
                                        ${escapeHtml(item.sender_name || '')}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }
        } else {
            if (!linkItems.length) {
                html = `
                    <div class="media-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <p>Нет ссылок</p>
                    </div>
                `;
            }
            else {
                html = '<div class="links-list">';
                linkItems.forEach((item) => {
                    const date = formatItemDate(item.created_at);
                    html += `
                        <div class="link-item" data-link-url="${escapeHtml(item.url)}">
                            <div class="link-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                    <polyline points="15 3 21 3 21 9"/>
                                    <line x1="10" y1="14" x2="21" y2="3"/>
                                </svg>
                            </div>
                            <div class="link-content">
                                <div class="link-url">${escapeHtml(item.url)}</div>
                                <div class="link-meta"><span>${escapeHtml(date)}</span> · <span>${escapeHtml(item.sender_name || '')}</span></div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }
        }
        pane.innerHTML = `<div class="media-content">${html}</div>`;
        pane.querySelectorAll('.media-grid-item').forEach((item) => {
            item.addEventListener('click', (e) => openMediaItem(Number(item.dataset.mediaIndex), e));
        });
        pane.querySelectorAll('.voice-item').forEach((item) => {
            item.addEventListener('click', () => playVoiceMessage(item.dataset.voiceSrc || '', Number(item.dataset.voiceId || 0)));
        });
        pane.querySelectorAll('.link-item').forEach((item) => {
            item.addEventListener('click', () => openLink(item.dataset.linkUrl || ''));
        });
    };

    const setupAvatarPullToExpand = () => {
        const avatarSection = document.getElementById('avatarSection');
        const content = document.getElementById('content');
        const avatarBox = avatarSection ? avatarSection.querySelector('.avatar-box') : null;
        if (!avatarSection || !content || avatarSection.dataset.pullBound === '1') return;
        avatarSection.dataset.pullBound = '1';
        const expandAvatar = () => {
            if (avatarState !== 'normal') return;
            avatarState = 'expanded';
            avatarSection.classList.add('expanded');
        };
        const collapseAvatar = () => {
            if (avatarState !== 'expanded') return;
            avatarState = 'normal';
            avatarSection.classList.remove('expanded');
        };
        const enterFullscreen = () => {
            if (avatarState === 'normal') return;
            avatarState = 'fullscreen';
            avatarSection.classList.add('fullscreen');
            content.style.overflow = 'hidden';
        };
        const exitFullscreen = () => {
            if (avatarState !== 'fullscreen') return;
            avatarState = 'expanded';
            avatarSection.classList.remove('fullscreen');
            content.style.overflow = '';
        };
        avatarSection.addEventListener('touchstart', (e) => {
            if (!e.touches || e.touches.length !== 1) return;
            avatarPullStartY = e.touches[0].clientY;
            if (avatarState === 'fullscreen') { isPullingAvatar = true; return; }
            const startedOnAvatar = avatarBox ? avatarBox.contains(e.target) : false;
            const atTop = content.scrollTop <= 4;
            isPullingAvatar = startedOnAvatar && atTop;
        }, { passive: true });
        avatarSection.addEventListener('touchmove', (e) => {
            if ((!isPullingAvatar && avatarState !== 'fullscreen') || !e.touches || e.touches.length !== 1) return;
            const deltaY = e.touches[0].clientY - avatarPullStartY;
            if (avatarState === 'fullscreen') {
                if (deltaY > 30) {
                    e.preventDefault();
                    exitFullscreen();
                    isPullingAvatar = false;
                }
            } else if (isPullingAvatar) {
                e.preventDefault();
                if (deltaY < -30) {
                    if (avatarState === 'normal' && Math.abs(deltaY) > 50) { expandAvatar(); isPullingAvatar = false; }
                    else if (avatarState === 'expanded' && Math.abs(deltaY) > 80) { enterFullscreen(); isPullingAvatar = false; }
                } else if (deltaY > 30 && avatarState === 'expanded') {
                    collapseAvatar();
                    isPullingAvatar = false;
                }
            }
        }, { passive: false });
        avatarSection.addEventListener('touchend', () => { isPullingAvatar = false; }, { passive: true });
        avatarSection.addEventListener('touchcancel', () => { isPullingAvatar = false; }, { passive: true });
        avatarSection.addEventListener('click', () => {
            if (avatarState === 'fullscreen') exitFullscreen();
            else if (avatarState === 'expanded') enterFullscreen();
        });
    };

    const render = () => {
        const content = document.getElementById('content');
        const editBtn = document.getElementById('editBtn');
        if (!group) {
            document.getElementById('headerTitle').textContent = 'Группа';
            editBtn.style.display = 'none';
            content.innerHTML = '<div class="empty">Группа не найдена</div>';
            return;
        }
        document.getElementById('headerTitle').textContent = group.name || 'Группа';
        const membersCount = Number(group.members_count || members.length || 0);
        const canLeave = !!group.is_member && !group.is_owner;
        const canEdit = !!group.can_edit;
        const showInvite = !canEdit;
        editBtn.style.display = canEdit ? 'flex' : 'none';
        content.classList.toggle('can-edit', editMode && canEdit);
        
        const avatarPreview = (pendingAvatar || group.avatar) 
            ? `<img src="${escapeHtml(pendingAvatar || group.avatar)}">` 
            : (group.name || 'Г').charAt(0).toUpperCase();
        
        const currentGroupType = group.group_type || 'public';
        
        content.innerHTML = `
            <div class="avatar-section" id="avatarSection">
                <div class="avatar-box">
                    ${(pendingAvatar || group.avatar) ? `<img src="${escapeHtml(pendingAvatar || group.avatar)}">` : (group.name || 'Г').charAt(0).toUpperCase()}
                </div>
            </div>
            <div class="group-name">${escapeHtml(group.name || 'Группа')}</div>
            <div class="group-meta">${membersCount.toLocaleString()} ${getWord(membersCount, ['участник', 'участника', 'участников'])} · ${group.group_type === 'private' ? 'Закрытая' : 'Открытая'}</div>
            ${group.description ? `<div class="group-description">${escapeHtml(group.description)}</div>` : ''}
            <div class="actions-row">
                <button class="action-btn danger" id="reportBtn">Пожаловаться</button>
                ${canLeave ? '<button class="action-btn" id="leaveBtn">Выйти</button>' : ''}
                ${showInvite ? '<button class="action-btn" id="inviteBtn">Пригласить</button>' : ''}
            </div>
            <div class="editor-panel">
                <div class="settings-card">
                    <div class="setting-section">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M20 4L4 20M20 20L4 4"/></svg>
                            </div>
                            <div>
                                <div class="section-title">Основная информация</div>
                                <div class="section-desc">Название и описание группы</div>
                            </div>
                        </div>
                        <input class="input-field" id="groupNameEdit" value="${escapeHtml(group.name || '')}" placeholder="Название группы">
                        <textarea class="textarea-field" id="groupDescriptionEdit" placeholder="Описание группы">${escapeHtml(group.description || '')}</textarea>
                    </div>
                    <div class="setting-section">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/></svg>
                            </div>
                            <div>
                                <div class="section-title">Тип группы</div>
                                <div class="section-desc">Кто может найти и вступить</div>
                            </div>
                        </div>
                        <div class="group-type-selector">
                            <div class="type-card ${currentGroupType === 'public' ? 'selected' : ''}" data-type="public">
                                <div class="type-icon-svg">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <circle cx="12" cy="12" r="10"/>
                                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                                    </svg>
                                </div>
                                <div class="type-title">Открытая</div>
                                <div class="type-description">Любой может найти и вступить</div>
                            </div>
                            <div class="type-card ${currentGroupType === 'private' ? 'selected' : ''}" data-type="private">
                                <div class="type-icon-svg">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="5" y="11" width="14" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                        <circle cx="12" cy="16" r="1.5"/>
                                    </svg>
                                </div>
                                <div class="type-title">Закрытая</div>
                                <div class="type-description">Только по приглашениям</div>
                            </div>
                        </div>
                    </div>
                    <div class="setting-section">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            </div>
                            <div>
                                <div class="section-title">Аватар группы</div>
                                <div class="section-desc">Квадратное изображение</div>
                            </div>
                        </div>
                        <div class="avatar-setting">
                            <div class="avatar-preview-box">${avatarPreview}</div>
                            <button class="avatar-change-btn" id="changeAvatarBtn">Выбрать фото</button>
                            <input type="file" id="groupAvatarInput" accept="image/*" style="display:none;">
                        </div>
                    </div>
                    ${group.is_owner ? `
                    <div class="setting-section">
                        <div class="admin-link" id="manageAdminsBtn">
                            <div class="admin-link-left">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <div>
                                    <div class="admin-link-text">Администраторы</div>
                                    <div class="admin-link-sub">Назначьте помощников</div>
                                </div>
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                        </div>
                    </div>
                    ` : ''}
                    <div class="action-buttons-group">
                        <button class="primary-btn" id="saveGroupBtn">Сохранить изменения</button>
                        ${group.is_owner ? '<button class="danger-btn-red" id="deleteGroupBtn">Удалить группу</button>' : ''}
                    </div>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn ${currentGroupTab === 'members' ? 'active' : ''}" data-tab="members">Участники</button>
                <button class="tab-btn ${currentGroupTab === 'media' ? 'active' : ''}" data-tab="media">Медиа</button>
                <button class="tab-btn ${currentGroupTab === 'voice' ? 'active' : ''}" data-tab="voice">Голосовые</button>
                <button class="tab-btn ${currentGroupTab === 'links' ? 'active' : ''}" data-tab="links">Ссылки</button>
            </div>
            <div class="tab-pane ${currentGroupTab === 'members' ? 'active' : ''}" data-pane="members">${renderMembers()}</div>
            <div class="tab-pane ${currentGroupTab === 'media' ? 'active' : ''}" data-pane="media"></div>
            <div class="tab-pane ${currentGroupTab === 'voice' ? 'active' : ''}" data-pane="voice"></div>
            <div class="tab-pane ${currentGroupTab === 'links' ? 'active' : ''}" data-pane="links"></div>
        `;

        
        document.querySelectorAll('.type-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
        });

        document.getElementById('reportBtn')?.addEventListener('click', openReportModal);
        document.getElementById('leaveBtn')?.addEventListener('click', leaveGroup);
        document.getElementById('inviteBtn')?.addEventListener('click', openInviteOverlay);
        document.getElementById('saveGroupBtn')?.addEventListener('click', saveGroupChanges);
        document.getElementById('deleteGroupBtn')?.addEventListener('click', deleteGroup);
        document.getElementById('changeAvatarBtn')?.addEventListener('click', () => document.getElementById('groupAvatarInput')?.click());
        document.getElementById('groupAvatarInput')?.addEventListener('change', (e) => handleAvatarUpload(e.target.files?.[0]));
        document.getElementById('manageAdminsBtn')?.addEventListener('click', async () => {
            await refreshAdminCandidates('');
            renderAdminsList();
            document.getElementById('adminsOverlay').classList.add('show');
        });
        document.querySelectorAll('[data-remove]').forEach((btn) => {
            btn.addEventListener('click', () => removeMember(Number(btn.dataset.remove)));
        });
        document.querySelectorAll('[data-tab]').forEach((btn) => {
            btn.addEventListener('click', () => {
                currentGroupTab = btn.dataset.tab || 'members';
                document.querySelectorAll('[data-tab]').forEach((t) => t.classList.toggle('active', t === btn));
                document.querySelectorAll('[data-pane]').forEach((p) => p.classList.toggle('active', p.dataset.pane === currentGroupTab));
                if (currentGroupTab !== 'members') renderMediaTab(currentGroupTab);
            });
        });
        if (currentGroupTab !== 'members') renderMediaTab(currentGroupTab);
        setupAvatarPullToExpand();
        const avatarSection = document.getElementById('avatarSection');
        if (avatarSection) {
            avatarSection.classList.toggle('expanded', avatarState !== 'normal');
            avatarSection.classList.toggle('fullscreen', avatarState === 'fullscreen');
        }
    };

    const init = async () => {
        document.getElementById('backBtn').addEventListener('click', () => history.back());
        document.getElementById('editBtn').addEventListener('click', () => {
            editMode = !editMode;
            render();
        });
        document.getElementById('closeInviteOverlayBtn').addEventListener('click', () => document.getElementById('inviteOverlay').classList.remove('show'));
        document.getElementById('closeAdminsOverlayBtn').addEventListener('click', () => document.getElementById('adminsOverlay').classList.remove('show'));
        document.getElementById('copyInviteBtn').addEventListener('click', async () => {
            const value = document.getElementById('inviteLinkField').value;
            if (value) {
                await navigator.clipboard.writeText(value);
                showToast('Ссылка скопирована');
            }
        });
        document.getElementById('adminSearchInput').addEventListener('input', async (e) => {
            await refreshAdminCandidates(e.target.value);
            renderAdminsList();
        });
        setupImageViewerGestures();
        setupVideoPlayer();
        await loadGroup();
    };

    setupReportModal();
    init();
</script>
<script src="calls_common.js"></script>
<script>
    if (window.TobebeCallNotifier?.init) {
        window.TobebeCallNotifier.init({
            apiUrl: apiUrl,
            getCurrentUserId: () => currentUser?.id || null,
            onAccept: (call) => {
                const type = call.call_type === 'video' ? 'video' : 'voice';
                window.location.href = `calls.html?call_id=${encodeURIComponent(call.id)}&mode=callee&type=${encodeURIComponent(type)}`;
            },
            toast: (text) => alert(text)
        });
    }
</script>
