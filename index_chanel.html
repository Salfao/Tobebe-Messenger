            const customReason = selectedReportReason === 'custom' ? customReasonInput.value.trim() : '';
            if (selectedReportReason === 'custom' && !customReason) {
                showToast('Пожалуйста, напишите причину жалобы');
                return;
            }
            const contextText = `Источник: Канал #${channel.id || channelId}${channel.name ? ` (${channel.name})` : ''}`;
            const customReasonPayload = selectedReportReason === 'custom'
                ? `${customReason}\n\n${contextText}`
                : contextText;

            submitReportBtn.disabled = true;
            submitReportBtn.textContent = 'Отправка...';
            try {
                const data = await apiPost('report_user', {
                    reporter_id: currentUser.id,
                    reported_user_id: reportedUserId,
                    reason: getReasonText(selectedReportReason),
                    custom_reason: customReasonPayload
                });
                if (data.success) {
                    showToast('Жалоба отправлена. Спасибо!');
                    closeReportModal();
                } else {
                    showToast(data.message || 'Ошибка отправки жалобы');
                }
            } catch (_) {
                showToast('Ошибка соединения');
            } finally {
                submitReportBtn.disabled = false;
                submitReportBtn.textContent = 'Отправить жалобу';
            }
        };

        const setupReportModal = () => {
            renderReportReasons();
            reportReasonsList.querySelectorAll('.report-reason-item').forEach((item) => {
                item.addEventListener('click', () => {
                    reportReasonsList.querySelectorAll('.report-reason-item').forEach((i) => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedReportReason = item.dataset.reason || null;
                    if (selectedReportReason === 'custom') {
                        customReasonInput.style.display = 'block';
                        customReasonInput.focus();
                    } else {
                        customReasonInput.style.display = 'none';
                        customReasonInput.value = '';
                    }
                    submitReportBtn.disabled = !selectedReportReason;
                });
            });
            closeReportModalBtn?.addEventListener('click', closeReportModal);
            cancelReportBtn?.addEventListener('click', closeReportModal);
            submitReportBtn?.addEventListener('click', submitReport);
            reportModal?.addEventListener('click', (e) => {
                if (e.target === reportModal) closeReportModal();
            });
        };

        const reportChannel = () => openReportModal();

        const render = () => {
            const container = document.getElementById('channelContent');
            if (!channel) {
                container.innerHTML = '<div class="empty-state" style="margin-top: 100px;">Канал не найден</div>';
                return;
            }

            const subsCount = channel.members_count || (channel.member_ids || []).length || 0;
            const link = channel.invite_link || (channel.group_type === 'public' 
                ? `https://tobebe.online/to.be.html?channel=${channel.public_id || ''}`
                : `https://tobebe.online/to.be.html?channel_token=${channel.invite_token || ''}`);
            const canEdit = channel.can_edit || channel.is_owner || channel.is_admin;
            const isOwner = channel.is_owner;

            document.getElementById('editTopBtn').style.display = canEdit ? 'flex' : 'none';
            document.getElementById('headerTitle').textContent = channel.name || 'Канал';

            container.innerHTML = `
                <div class="avatar-section" id="avatarSection">
                    <div class="avatar-wrapper">
                        <div class="avatar-box">
                            ${channel.avatar ? `<img src="${escapeHtml(channel.avatar)}">` : escapeHtml((channel.name || 'К').charAt(0).toUpperCase())}
                        </div>
                    </div>
                    <div class="channel-name">
                        <div class="name-text">${escapeHtml(channel.name || 'Канал')}</div>
                    </div>
                    <div class="stats-row">
                        <svg class="stats-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span class="stats-count">${subsCount}</span>
                        <span class="stats-label">${getWord(subsCount, ['подписчик', 'подписчика', 'подписчиков'])}</span>
                    </div>
                </div>

                <div class="actions">
                    ${!editMode ? `<button class="action-btn" id="reportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="none"/></svg>Жалоба</button>` : ''}
                    ${!isOwner ? `<button class="action-btn" id="leaveBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Покинуть</button>` : ''}
                </div>

                <div class="info-card">
                    <div class="info-row" id="linkRow">
                        <div class="info-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Ссылка-приглашение</div>
                        <div class="info-value link-value">${escapeHtml(link)}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Описание</div>
                        <div class="info-value">${escapeHtml(channel.description || 'Описание отсутствует')}</div>
                    </div>
                </div>

                <div class="media-slider-section">
                    <div class="glass-tab-bar">
                        <button class="glass-tab active" data-tab="media">Медиа</button>
                        <button class="glass-tab" data-tab="voice">Голосовые</button>
                        <button class="glass-tab" data-tab="links">Ссылки</button>
                    </div>
                    <div class="media-content" id="channelMediaContent"></div>
                </div>
            `;

            document.getElementById('reportBtn')?.addEventListener('click', reportChannel);
            document.getElementById('leaveBtn')?.addEventListener('click', leaveChannel);
            document.getElementById('linkRow')?.addEventListener('click', () => copyLink(link));
            document.querySelectorAll('.glass-tab').forEach((tabBtn) => {
                tabBtn.addEventListener('click', () => renderMediaTab(tabBtn.dataset.tab || 'media'));
            });
            renderMediaTab(currentMediaTab);
            setupAvatarPullToExpand();
            const avatarSection = document.getElementById('avatarSection');
            if (avatarSection) {
                avatarSection.classList.toggle('expanded', avatarState !== 'normal');
                avatarSection.classList.toggle('fullscreen', avatarState === 'fullscreen');
            }
        };

        const init = async () => {
            if (!channelId || !currentUser?.id) {
                document.getElementById('channelContent').innerHTML = '<div class="empty-state" style="margin-top: 100px;">Канал не указан</div>';
                return;
            }
            channel = await fetchChannel();
            await loadChannelMediaData();
            render();
            setupImageViewerGestures();
            setupVideoPlayer();
            
            document.querySelectorAll('.editor-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.editor-tab-content').forEach(content => content.classList.remove('active'));
                    const tabId = tab.dataset.tab;
                    if (tabId === 'main') document.getElementById('tabMain').classList.add('active');
                    if (tabId === 'admins') document.getElementById('tabAdmins').classList.add('active');
                    if (tabId === 'subscribers') document.getElementById('tabSubscribers').classList.add('active');
                });
            });
            
            const publicIdInput = document.getElementById('editPublicId');
            if (publicIdInput) {
                publicIdInput.addEventListener('input', updatePublicIdHint);
            }
            
            const adminSearch = document.getElementById('adminSearchInput');
            if (adminSearch) {
                adminSearch.addEventListener('input', (e) => {
                    const q = e.target.value.toLowerCase();
                    const adminIds = new Set(adminsList.map(a => Number(a.id)));
                    const candidates = allUsers.filter(u => !adminIds.has(Number(u.id)) && Number(u.id) !== Number(channel?.owner_id));
                    const filtered = candidates.filter(u => 
                        (u.username || '').toLowerCase().includes(q) || 
                        (u.display_name || '').toLowerCase().includes(q)
                    );
                    const usersContainer = document.getElementById('usersList');
                    if (usersContainer && channel?.is_owner) {
                        usersContainer.innerHTML = filtered.length ? filtered.map(user => `
                            <div class="user-list-item">
                                <div class="user-list-avatar">${user.avatar ? `<img src="${escapeHtml(user.avatar)}">` : (user.display_name || user.username || 'U').charAt(0).toUpperCase()}</div>
                                <div class="user-list-info">
                                    <div class="user-list-name">${escapeHtml(user.display_name || user.username)}</div>
                                    <div class="user-list-username">@${escapeHtml(user.username)}</div>
                                </div>
                                <button class="user-list-action" onclick="window.addAdminToChannel(${user.id})">Назначить</button>
                            </div>
                        `).join('') : '<div class="empty-state">Ничего не найдено</div>';
                    }
                });
            }
            
            const subSearch = document.getElementById('subscriberSearchInput');
            if (subSearch) {
                subSearch.addEventListener('input', (e) => {
                    const q = e.target.value.toLowerCase();
                    const filtered = subscribersList.filter(u => 
                        (u.username || '').toLowerCase().includes(q) || 
                        (u.display_name || '').toLowerCase().includes(q)
                    );
                    const container = document.getElementById('subscribersList');
                    const canRemove = channel?.is_owner || channel?.is_admin;
                    if (container) {
                        container.innerHTML = filtered.length ? filtered.map(sub => `
                            <div class="user-list-item">
                                <div class="user-list-avatar">${sub.avatar ? `<img src="${escapeHtml(sub.avatar)}">` : (sub.display_name || sub.username || 'U').charAt(0).toUpperCase()}</div>
                                <div class="user-list-info">
                                    <div class="user-list-name">${escapeHtml(sub.display_name || sub.username)} ${sub.is_owner ? '<span class="user-list-badge">Создатель</span>' : ''} ${sub.is_admin ? '<span class="user-list-badge">Админ</span>' : ''}</div>
                                    <div class="user-list-username">@${escapeHtml(sub.username)}</div>
                                </div>
                                ${canRemove && !sub.is_owner ? `<button class="user-list-action" onclick="window.removeSubscriberFromChannel(${sub.id})">Удалить</button>` : ''}
                            </div>
                        `).join('') : '<div class="empty-state">Ничего не найдено</div>';
                    }
                });
            }
            
            const content = document.getElementById('channelContent');
            const headerTitle = document.getElementById('headerTitle');
            content.addEventListener('scroll', () => {
                const scrollY = content.scrollTop;
                const opacity = Math.min(1, scrollY / 100);
                headerTitle.style.opacity = opacity;
                const avatarSection = document.querySelector('.avatar-section');
                if (avatarSection) {
                    if (scrollY > 60) avatarSection.classList.add('shrink');
                    else avatarSection.classList.remove('shrink');
                }
            });
        };

        document.getElementById('backBtn').addEventListener('click', () => history.back());
        document.getElementById('editTopBtn').addEventListener('click', openEditor);
        document.getElementById('editorCloseBtn').addEventListener('click', closeEditor);
        document.getElementById('editorCancelBtn').addEventListener('click', closeEditor);
        document.getElementById('editorSaveBtn').addEventListener('click', saveChannel);
        document.getElementById('uploadAvatarBtn').addEventListener('click', handleAvatarUpload);
        document.getElementById('toggleTypeBtn')?.addEventListener('click', toggleChannelType);
        document.getElementById('sheetCloseBtn').addEventListener('click', () => document.getElementById('sheet').classList.remove('show'));
        document.getElementById('sheet').addEventListener('click', (e) => { if (e.target.id === 'sheet') document.getElementById('sheet').classList.remove('show'); });

        window.addAdminToChannel = addAdminToChannel;
        window.removeAdminFromChannel = removeAdminFromChannel;
        window.removeSubscriberFromChannel = removeSubscriberFromChannel;

        setupReportModal();
        init();
    })();
</script>
</body>
</html>
